aid: archimate
name: ArchiMate
description: ArchiMate is an open and independent enterprise architecture modeling language developed by The Open Group, supporting description, analysis and visualization of architecture within and 
  across business domains in an unambiguous way. The current version is ArchiMate 3.2.
